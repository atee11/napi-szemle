name: Árfolyam frissítése

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: napi-szemle-data-write
  cancel-in-progress: false

jobs:
  update-fx:
    runs-on: ubuntu-latest
    steps:
      - name: Repó kicheckoutolása
        uses: actions/checkout@v4

      - name: Node.js beállítása
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Árfolyam frissítése
        run: node scripts/update-fx.mjs

      - name: Frissített árfolyam commitolása
        run: |
          git config user.name "napi-szemle-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/summaries.json
          git diff --quiet --cached || git commit -m "Árfolyam automatikus frissítése [ci skip]"
          git pull --rebase
          git push

